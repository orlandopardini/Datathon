services:
  - type: web
    name: passos-magicos-evasao-api
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
